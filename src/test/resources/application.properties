spring.datasource.url=jdbc:h2:mem:notifsvc-test-${random.uuid};DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

notifsvc.security.jwt-secret=test-secret-key-not-for-production-0123456789abcdef
notifsvc.security.jwt-expiration-minutes=60
notifsvc.dispatch.poll-interval-millis=200
notifsvc.dispatch.batch-size-per-tenant=10
notifsvc.dispatch.pool-size-per-channel=2
notifsvc.retry.base-delay-seconds=1
notifsvc.retry.max-delay-seconds=5
