spring.application.name=notification-service

# Default profile: H2, file-based, zero setup. Data persists across restarts under ./data
spring.datasource.url=jdbc:h2:file:./data/notifsvc;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT signing secret and token lifetime - override via env var in real deployments
notifsvc.security.jwt-secret=${JWT_SECRET:dev-only-secret-key-change-me-please-0123456789abcdef}
notifsvc.security.jwt-expiration-minutes=60

# Dispatch worker pool size per channel
notifsvc.dispatch.pool-size-per-channel=4
notifsvc.dispatch.poll-interval-millis=1000
notifsvc.dispatch.batch-size-per-tenant=10
