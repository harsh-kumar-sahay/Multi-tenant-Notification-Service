# Activate with: --spring.profiles.active=postgres
# Requires a local Postgres with the notification_service DB and notifsvc role already created.
spring.datasource.url=jdbc:postgresql://localhost:5432/notification_service
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:notifsvc}
spring.datasource.password=${DB_PASSWORD:notifsvc_pw}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false
